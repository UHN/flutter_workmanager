name: workmanager_apple
description: Apple platform (iOS/macOS) implementation of the workmanager plugin.
version: 0.9.2+1
# publish_to: none
homepage: https://github.com/UHN/flutter_workmanager
repository: https://github.com/UHN/flutter_workmanager
issue_tracker: https://github.com/UHN/flutter_workmanager/issues

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  workmanager_platform_interface:
    path: ../workmanager_platform_interface

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: workmanager
    platforms:
      ios:
        pluginClass: WorkmanagerPlugin